version: '3.8'

services:
  # Aplicação FastAPI
  web:
    build: .
    restart: always
    environment:
      # Variáveis de ambiente (chaves de API, etc)      
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}      
    networks:
      - app-network

  # Nginx Reverse Proxy e SSL Terminator
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"   # HTTP (Necessário para Certbot inicial)
      - "443:443" # HTTPS
    volumes:
      # Configuração do Nginx que vamos criar
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Volumes compartilhados com Certbot para SSL
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/html
    depends_on:
      - web
    networks:
      - app-network

  # Certbot para Automação de SSL
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/html
    # Comando para verificar renovação a cada 12 horas
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done;'"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  certbot-etc:
  certbot-var:
  webroot: